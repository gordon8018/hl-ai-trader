name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest \
            pydantic \
            redis \
            prometheus-client \
            httpx \
            requests \
            numpy \
            pandas

      - name: Run core tests
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
          DRY_RUN: "true"
        run: |
          python -m pytest -q \
            tests/v17 \
            tests/config/test_v17_shadow_config.py \
            tests/test_execution_utils.py \
            tests/test_risk_engine_utils.py
